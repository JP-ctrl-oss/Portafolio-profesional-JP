<!DOCTYPE html>
<html lang="es" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Simulador Vernier - JP</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #f8fafc;
        color: #0f172a;
      }
      a {
        color: #2563eb;
        text-decoration: none;
      }
      .header-main {
        background: #ffffff;
        border-bottom: 1px solid #e2e8f0;
        position: sticky;
        top: 0;
        z-index: 20;
      }
      .top-bar {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0.75rem 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .top-bar .brand {
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      .top-bar .brand img {
        width: 70px;
        height: auto;
      }
      .top-bar .brand h1 {
        margin: 0;
        font-size: 1rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      .top-bar .actions {
        display: flex;
        align-items: center;
        gap: 1rem;
        font-size: 0.95rem;
      }
      .top-bar .actions a {
        color: #1f2937;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
      }
      .main-content {
        max-width: 1200px;
        margin: 2rem auto 3rem;
        padding: 0 1rem;
      }
      .iframe-card {
        background: #ffffff;
        border-radius: 1rem;
        overflow: hidden;
        border: 1px solid #e2e8f0;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
      }
      .iframe-card iframe {
        width: 100%;
        min-height: 720px;
        border: 0;
        display: block;
      }
      .page-title {
        margin: 0 0 1rem;
        font-size: clamp(1.75rem, 3vw, 2.5rem);
        line-height: 1.05;
      }
      .page-subtitle {
        margin: 0 0 1.5rem;
        color: #475569;
        max-width: 40rem;
      }
      .footer {
        text-align: center;
        color: #64748b;
        font-size: 0.9rem;
        padding: 1.5rem 1rem 2rem;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: #eef2ff;
        color: #4338ca;
        padding: 0.5rem 0.85rem;
        border-radius: 9999px;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <div class="header-main">
      <div class="top-bar">
        <div class="brand">
          <img src="https://raw.githubusercontent.com/JP-ctrl-oss/Portafolio-profesional-JP/main/public/logo.png" alt="JP Logo" />
          <div>
            <h1>Simulador Vernier</h1>
            <p style="margin:0;color:#64748b;font-size:0.9rem;">Carga independiente desde el menú Tools</p>
          </div>
        </div>
        <div class="actions">
          <a href="/">Volver al portafolio</a>
          <span class="badge">1/128 pulgada</span>
        </div>
      </div>
    </div>

    <main class="main-content">
      <div class="iframe-card">
        <iframe
          src="https://maheshkurmi.github.io/experiments/vernier_calliper.html"
          title="Vernier Caliper Simulator"
          allowfullscreen
          loading="lazy"
        ></iframe>
      </div>
    </main>

    <footer class="footer">Diseñado para simulación independiente de vernier. Ajusta con la misma precisión 1/128" y controla desde una página dedicada.</footer>
  </body>
</html>
